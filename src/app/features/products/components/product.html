<div class="row">
  <div class="col-md-2">Filtrar por:</div>
  <div class="col-md-2">
    <input type="text" [(ngModel)]="listFilter">
  </div>
  <div class="col-md-4">
    Filtrado por: {{ listFilter() }}
  </div>
  <div class="col-md-2">
    <button class="btn btn-primary" (click)="abrirModal()">
      Crear Producto
    </button>
  </div>
</div>

<br>
@if (isModalOpen()){
  <app-modal-add (close)="cerrarModal()"></app-modal-add>
}


  <app-product-list 
  [datos]="filteredProducts()" 
  (updatedProducts)="this.productService.products.set($event)">
  </app-product-list>
