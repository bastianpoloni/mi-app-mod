<div class="modal fade show d-block" tabindex="-1" role="dialog">
    <div class="modal-dialog">
        <div class="modal-content">
            <form [formGroup]="formProduct" (ngSubmit)="saveData()" novaliddata>
                <div class="modal-header">
                    <h4 class="modal-title">Crear Producto</h4>
                    <button type="button" class="btn-close" data-dismiss="modal" (click)="ocultarModal()">
                        &times;
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group row">
                        <label class="col-2 col-form-label">Nombre</label>
                        <div class="col-md-10">
                            <input formControlName="name" type="text" class="form-control" placeholder="Nombre" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-2 col-form-label">Codigo</label>
                        <div class="col-md-10">
                            <input formControlName="code" type="text" class="form-control" placeholder="Codigo" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-2 col-form-label">Fecha</label>
                        <div class="col-md-10">
                            <input formControlName="date" type="date" class="form-control" placeholder="Fecha" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-2 col-form-label">Precio</label>
                        <div class="col-md-10">
                            <input formControlName="price" type="number" class="form-control" placeholder="Precio" />
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-2 col-form-label">Descripcion</label>
                        <div class="col-md-10">
                            <textarea formControlName="description" class="form-control"
                                placeholder="Descripcion"></textarea>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-2 col-form-label">Rating</label>
                        <div class="col-md-10">
                            <input formControlName="rating" type="number" class="form-control" placeholder="Rating" />
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <button type="button" class="btn btn-default" data-dismiss="modal" (click)="ocultarModal()">
                        Cerrar
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>
